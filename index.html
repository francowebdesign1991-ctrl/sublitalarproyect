<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sublimados Talar</title>

<style>

/* RESET */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
    color: #111;
    overflow-x: hidden;
}

/* HEADER */
.header {
    height: 90px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
    padding: 0 20px;
}

/* MENÚ */
.menu-btn {
    font-size: 26px;
    color: white;
    cursor: pointer;
}

/* LOGO */
.logo {
    height: 60px;
    margin-left: 10px;
    margin-right: 20px;
}

/* TÍTULO A LA IZQUIERDA */
.title {
    font-family: Tahoma, sans-serif;
    font-size: 62px;
    color: white;
    animation: glowIn 2s ease forwards, neonBlink 2s infinite alternate;
}

/* ANIMACIONES */
@keyframes glowIn {
    0% { opacity: 0; text-shadow: 0 0 0px #1BAEC4; }
    100% { opacity: 1; text-shadow: 0 0 20px #1BAEC4; }
}
@keyframes neonBlink {
    0% { text-shadow: 0 0 5px #1BAEC4, 0 0 10px #1BAEC4; color: #fff; }
    50% { text-shadow: 0 0 20px #1BAEC4, 0 0 40px #1BAEC4; color: #1BAEC4; }
    100% { text-shadow: 0 0 5px #1BAEC4, 0 0 10px #1BAEC4; color: #fff; }
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    top: 90px;
    left: -220px;
    width: 220px;
    height: calc(100% - 90px);
    background: #111;
    transition: 0.3s;
    z-index: 999;
    display: flex;
    flex-direction: column;
}

.sidebar.active { left: 0; }

.sidebar a {
    padding: 18px 20px;
    color: white;
    text-decoration: none;
    font-family: "Franklin Gothic Medium", Arial, sans-serif;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

.sidebar a:hover { background: #1BAEC4; }

/* OVERLAY */
.overlay {
    position: fixed;
    top: 90px;
    left: 0;
    width: 100%;
    height: calc(100% - 90px);
    background: rgba(0,0,0,0.5);
    display: none;
}

.overlay.active { display: block; }

/* MAIN */
.main {
    margin-top: 90px;
    padding: 20px;
}

/* PRODUCTOS */
.products {
    position: relative;
    height: 650px;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.card {
    position: absolute;
    width: 100%;
    max-width: 400px;
    left: 50%;
    transform: translateX(150%);
    opacity: 0;
    transition: all 0.8s ease;
}

.card.active { transform: translateX(-50%); opacity: 1; }

/* CARD INTERIOR */
.card-inner {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #eee;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    max-width: 100%;
    margin: 0 auto;
}

.card-inner img {
    width: 100%;
    height: 400px;
    object-fit: cover;
}

.card-body { padding: 20px; }

.card-title { font-weight: bold; font-size: 20px; }

.card-price {
    margin: 15px 0;
    color: #1BAEC4;
    font-weight: bold;
}

.buy-btn {
    display: block;
    text-align: center;
    background: #000;
    color: white;
    padding: 12px;
    border-radius: 6px;
    text-decoration: none;
}

.buy-btn:hover { background: #1BAEC4; }

/* WHATSAPP */
.whatsapp-btn {
    position: fixed;
    bottom: 15px;
    right: 15px;
    width: 55px;
}

.whatsapp-btn img { width: 100%; }

.whatsapp-btn:hover { transform: scale(1.15); }

/* RESPONSIVE */
@media(max-width:768px){
    .header { height: 80px; padding: 0 10px; }
    .title { font-size: 28px; }
    .logo { height: 50px; margin-left: 5px; margin-right: 15px; }

    /* Carrusel en móvil */
    .products { height: 400px; }
    .card { max-width: 280px; }
    .card-inner img { height: 200px; }
    .card-body { padding: 10px; }
    .card-title { font-size: 16px; }
    .card-price { font-size: 14px; }
    .buy-btn { font-size: 14px; padding: 8px; }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="title">SUBLITALAR</div>
    <img src="icono1.jpeg" class="logo" alt="Logo">
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <a href="#">Inicio</a>
    <a href="#">Nuestros productos</a>
    <a href="#">Contacto</a>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<!-- CONTENIDO -->
<div class="main">
    <div class="products">
        <div class="card active">
            <div class="card-inner">
                <img src="billie1.jpeg" alt="Producto 1">
                <div class="card-body">
                    <div class="card-title">Remera Oversize Billie Eilish</div>
                    <div class="card-price">$25 USD</div>
                    <a href="#" class="buy-btn">Comprar por WhatsApp</a>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-inner">
                <img src="bjor2.jpeg" alt="Producto 2">
                <div class="card-body">
                    <div class="card-title">Tazas Personalizadas</div>
                    <div class="card-price">$40 USD</div>
                    <a href="#" class="buy-btn">Comprar por WhatsApp</a>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-inner">
                <img src="gorra3.jpeg" alt="Producto 3">
                <div class="card-body">
                    <div class="card-title">Gorras Diseño Personalizados</div>
                    <div class="card-price">$35 USD</div>
                    <a href="#" class="buy-btn">Comprar por WhatsApp</a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/549XXXXXXXXXX" class="whatsapp-btn">
    <img src="whatsapp.png" alt="WhatsApp">
</a>

<script>
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

/* CARRUSEL */
const cards = document.querySelectorAll(".card");
let index = 0;
setInterval(() => {
    cards.forEach(card => card.classList.remove("active"));
    index = (index + 1) % cards.length;
    cards[index].classList.add("active");
}, 3000);
</script>

</body>
</html>
