<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sublimados Talar</title>

<style>

/* RESET */
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
    overflow-x: hidden;
}

/* HEADER */
.header {
    height: 80px;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 1000;
}

.menu-btn {
    font-size: 24px;
    color: white;
    cursor: pointer;
}

.title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-family: Tahoma;
    font-size: 28px;
    color: white;
    animation: neonBlink 2s infinite alternate;
}

.logo {
    height: 50px;
}

/* ANIMACIÓN */
@keyframes neonBlink {
    0% { text-shadow: 0 0 5px #1BAEC4; }
    50% { text-shadow: 0 0 20px #1BAEC4; color: #1BAEC4; }
    100% { text-shadow: 0 0 5px #1BAEC4; }
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    top: 80px;
    left: -220px;
    width: 220px;
    height: calc(100% - 80px);
    background: #111;
    transition: 0.3s;
    z-index: 1100;
}

.sidebar.active { left: 0; }

.sidebar a {
    display: block;
    padding: 15px;
    color: white;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

.sidebar a:hover {
    background: #1BAEC4;
}

/* OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    z-index: 1050;
}

.overlay.active { display: block; }

/* MAIN */
.main {
    margin-top: 80px;
    padding: 15px;
}

/* CARRUSEL */
.products {
    position: relative;
    height: 500px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    position: absolute;
    width: 100%;
    max-width: 350px;
    left: 50%;
    transform: translateX(150%);
    opacity: 0;
    transition: 0.6s ease;
}

.card.active {
    transform: translateX(-50%);
    opacity: 1;
}

.card-inner {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}

.card-inner img {
    width: 100%;
    height: 280px;
    object-fit: cover;
}

.card-body {
    padding: 15px;
}

.card-title {
    font-size: 16px;
    font-weight: bold;
}

.card-price {
    color: #1BAEC4;
    font-weight: bold;
    margin: 8px 0;
}

.buy-btn {
    display: block;
    text-align: center;
    background: #000;
    color: white;
    padding: 8px;
    border-radius: 5px;
    text-decoration: none;
}

.buy-btn:hover {
    background: #1BAEC4;
}

/* FOOTER */
.footer {
    background: #000;
    color: white;
    padding: 25px 15px;
    font-family: "Courier New", monospace;
}

.footer-content {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

.footer-col {
    flex: 1;
    min-width: 200px;
}

.footer h2 {
    color: #1BAEC4;
    font-size: 15px;
}

.footer h3 {
    font-size: 12px;
    border-left: 2px solid #1BAEC4;
    padding-left: 5px;
    margin-bottom: 5px;
}

.icons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.icons img {
    max-width: 38px;
    height: auto;
    object-fit: contain;
    background: white;
    padding: 5px;
    border-radius: 6px;
}

.social-icons img {
    max-width: 30px;
    height: auto;
}

/* FOOTER FINAL */
.footer-bottom {
    text-align: center;
    margin-top: 15px;
    font-size: 12px;
}

/* WHATSAPP */
.whatsapp-btn {
    position: fixed;
    bottom: 15px;
    right: 15px;
    width: 50px;
}

.whatsapp-btn img {
    width: 100%;
}

/* 📱 RESPONSIVE MEJORADO */
@media(max-width:768px){

    .title {
        font-size: 22px;
    }

    .products {
        height: 380px;
    }

    .card {
        max-width: 260px;
    }

    .card-inner img {
        height: 180px;
    }

    /* FOOTER COMPACTO */
    .footer {
        padding: 15px 10px;
    }

    .footer-content {
        flex-direction: column;
        text-align: center;
        gap: 15px;
    }

    .footer-col {
        min-width: 100%;
    }

    .footer h2 {
        font-size: 14px;
    }

    .footer h3 {
        font-size: 11px;
    }

    .footer p {
        font-size: 12px;
    }

    .icons img {
        max-width: 28px;
        padding: 3px;
    }

    .social-icons img {
        max-width: 24px;
    }

    .icons, .social-icons {
        justify-content: center;
    }

    .footer-bottom {
        font-size: 10px;
    }
}

</style>
</head>

<body>

<div class="header">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="title">SUBLITALAR</div>
    <img src="icono1.jpeg" class="logo">
</div>

<div class="sidebar" id="sidebar">
    <a href="#">Inicio</a>
    <a href="#">Productos</a>
    <a href="#">Contacto</a>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="main">
<div class="products">

<div class="card active">
<div class="card-inner">
<img src="billie1.jpeg">
<div class="card-body">
<div class="card-title">Remera Oversize</div>
<div class="card-price">$25 USD</div>
<a href="#" class="buy-btn">Comprar</a>
</div>
</div>
</div>

<div class="card">
<div class="card-inner">
<img src="bjor2.jpeg">
<div class="card-body">
<div class="card-title">Tazas Personalizadas</div>
<div class="card-price">$40 USD</div>
<a href="#" class="buy-btn">Comprar</a>
</div>
</div>
</div>

</div>
</div>

<div class="footer">
<div class="footer-content">

<div class="footer-col">
<h2>Métodos de pago</h2>

<h3>Billeteras</h3>
<div class="icons">
<img src="mercadopago.png">
<img src="uala.png">
</div>

<h3>Efectivo</h3>
<div class="icons">
<img src="rapipago.png">
<img src="pagofacil.png">
</div>

<h3>Tarjetas</h3>
<div class="icons">
<img src="visa.png">
<img src="mastercard.png">
</div>
</div>

<div class="footer-col">
<h2>Envíos</h2>
<div class="icons">
<img src="correoargentino.png">
<img src="andreani.png">
</div>
</div>

<div class="footer-col">
<h2>Ubicación</h2>
<p>Tigre, Buenos Aires</p>

<h2>Seguinos</h2>
<div class="social-icons">
<a href="#"><img src="instagram.png"></a>
<a href="#"><img src="facebook.png"></a>
</div>
</div>

</div>

<div class="footer-bottom">
© SUBLITALAR 2026
</div>
</div>

<a href="#" class="whatsapp-btn">
<img src="whatsapp.png">
</a>

<script>
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

const cards = document.querySelectorAll(".card");
let index = 0;

setInterval(() => {
    cards.forEach(card => card.classList.remove("active"));
    index = (index + 1) % cards.length;
    cards[index].classList.add("active");
}, 3000);
</script>

</body>
</html>
